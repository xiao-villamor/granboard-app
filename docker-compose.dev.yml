# ─── Local Development ─────────────────────────────────────────
# Usage:  docker compose -f docker-compose.dev.yml up --build
#
# Hot-reload enabled for both services.
# Astro:  http://localhost:8080
# WS:    http://localhost:3001
# Health: http://localhost:3001/health

services:
  # ─── Astro Frontend (dev mode with hot reload) ───────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
      - PUBLIC_WS_URL=http://localhost:3001
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./astro.config.mjs:/app/astro.config.mjs
      - ./svelte.config.js:/app/svelte.config.js
      - ./tsconfig.json:/app/tsconfig.json
    depends_on:
      - ws

  # ─── WebSocket Server (dev mode with hot reload) ────────────
  ws:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - CORS_ORIGIN=http://localhost:8080,http://localhost:3000
    volumes:
      - ./server/src:/app/src
