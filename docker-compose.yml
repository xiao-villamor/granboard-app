services:
  # ─── Next.js Frontend ─────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Set to your Cloudflare Tunnel domain (e.g. https://darts.yourdomain.com)
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-https://darts.yourdomain.com}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    depends_on:
      - ws

  # ─── WebSocket Server ─────────────────────────────────────────
  ws:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped

# ─── Cloudflare Tunnel Setup ─────────────────────────────────────
# Configure two public hostnames in your Cloudflare Tunnel:
#
#   1. darts.yourdomain.com  ->  http://localhost:3000  (Next.js)
#   2. ws.darts.yourdomain.com  ->  http://localhost:3001  (WebSocket)
#
# Or use a single domain with path-based routing:
#   - darts.yourdomain.com/socket.io/*  ->  http://localhost:3001
#   - darts.yourdomain.com/*            ->  http://localhost:3000
#
# Make sure to enable WebSocket support in the Cloudflare dashboard
# for the WebSocket hostname (Network > WebSockets = On).
